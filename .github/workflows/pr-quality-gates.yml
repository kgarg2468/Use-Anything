name: PR Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check .

  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run deterministic fast tests
        run: uv run pytest -m "not live_smoke and not slow" -q

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test-fast
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Prepare changed-files list
        shell: bash
        run: |
          mkdir -p artifacts/audit
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            git diff --name-only "origin/${{ github.base_ref }}"...HEAD > artifacts/audit/changed-files.txt
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD > artifacts/audit/changed-files.txt
          else
            : > artifacts/audit/changed-files.txt
          fi

      - name: Run coverage
        run: |
          mkdir -p artifacts/audit
          uv run pytest --cov=src/use_anything --cov-report=json:artifacts/audit/coverage.json -q

      - name: Enforce coverage gates
        run: |
          uv run python scripts/audit/check_coverage.py \
            --coverage-json artifacts/audit/coverage.json \
            --changed-files artifacts/audit/changed-files.txt \
            --summary-output artifacts/audit/coverage_gate.json

      - name: Write audit summary contract
        if: always()
        shell: bash
        run: |
          STATUS="passed"
          CATEGORY=""
          if [[ "${{ job.status }}" != "success" ]]; then
            STATUS="failed"
            CATEGORY="regression"
          fi

          uv run python scripts/audit/write_summary.py \
            --gate coverage-gate \
            --status "${STATUS}" \
            --failure-category "${CATEGORY}" \
            --module-coverage-json artifacts/audit/coverage_gate.json \
            --output artifacts/audit/summary.json

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-audit-artifacts
          path: artifacts/audit
          if-no-files-found: error

  test-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - test-fast
    env:
      USE_ANYTHING_RUN_LIVE_SMOKE: "1"
      USE_ANYTHING_RUN_LIVE_SMOKE_LLM: ${{ secrets.OPENAI_API_KEY != '' && '1' || '0' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run live smoke tests
        run: uv run pytest -m live_smoke -q
